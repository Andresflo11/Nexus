<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Categoría</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23080a0f'/><text x='50' y='72' font-family='Arial Black,sans-serif' font-size='62' font-weight='900' text-anchor='middle' fill='%23e8ff47'>N</text></svg>">
<style>
  :root { --cat-color: var(--accent); }

  /* ── Layout principal ── */
  .ci-wrap {
    max-width: 1500px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }

  /* ── Cabecera ── */
  .ci-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .ci-header a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 1px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .ci-header a:hover { color: var(--cat-color); }
  .ci-sep { color: var(--border); font-size: 0.8rem; }
  .ci-titulo {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--cat-color);
    line-height: 1;
  }
  .ci-count {
    margin-left: auto;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 1px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Body: sidebar + grid ── */
  .ci-body {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 1.5rem;
    align-items: start;
  }
  @media (max-width: 860px) {
    .ci-body { grid-template-columns: 1fr; }
    .ci-sidebar { display: none; }
    .ci-sidebar.abierto { display: block; }
  }

  /* ── Sidebar de filtros ── */
  .ci-sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    position: sticky;
    top: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }
  .ci-sidebar-titulo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ci-clear-btn {
    background: none;
    border: none;
    color: var(--cat-color);
    font-size: 0.65rem;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: opacity 0.2s;
    padding: 0;
  }
  .ci-clear-btn.visible { opacity: 1; }

  /* Buscador en sidebar */
  .ci-search-wrap {
    position: relative;
  }
  .ci-search-wrap svg {
    position: absolute;
    left: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .ci-search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.75rem 0.55rem 2.1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .ci-search:focus { border-color: var(--cat-color); }

  /* Secciones de filtro */
  .ci-filtro-seccion { display: flex; flex-direction: column; gap: 0.5rem; }
  .ci-filtro-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }

  /* Chips de filtro */
  .ci-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .ci-chip {
    padding: 0.28rem 0.65rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    font-size: 0.72rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .ci-chip:hover {
    border-color: var(--cat-color);
    color: var(--cat-color);
    background: color-mix(in srgb, var(--cat-color) 8%, transparent);
  }
  .ci-chip.activo {
    border-color: var(--cat-color);
    background: color-mix(in srgb, var(--cat-color) 15%, transparent);
    color: var(--cat-color);
    font-weight: 600;
  }

  /* Select de ordenar */
  .ci-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    outline: none;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.2s;
  }
  .ci-select:focus { border-color: var(--cat-color); }

  /* Input de texto para buscar por campo */
  .ci-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    outline: none;
    width: 100%;
    box-sizing: border-box;
    transition: border-color 0.2s;
  }
  .ci-input:focus { border-color: var(--cat-color); }
  .ci-input::placeholder { color: var(--muted); }

  /* ── Barra superior móvil ── */
  .ci-topbar-movil {
    display: none;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  @media (max-width: 860px) {
    .ci-topbar-movil { display: flex; }
  }
  .ci-filtros-btn-movil {
    padding: 0.5rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.82rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Grid de cards ── */
  .ci-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.85rem;
  }
  @media (min-width: 600px) {
    .ci-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); }
  }
  @media (min-width: 1100px) {
    .ci-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
  }

  .ci-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    position: relative;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .ci-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.18);
    box-shadow: 0 8px 20px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.08);
    z-index: 1;
  }
  .ci-poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    overflow: hidden;
    position: relative;
  }
  .ci-poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }
  .ci-card:hover .ci-poster img {
    transform: scale(1.06);
  }
  .ci-poster-overlay { display: none; }

  .ci-card-info {
    padding: 0.55rem 0.6rem 0.65rem;
  }
  .ci-card-nombre {
    font-size: 0.76rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.2rem;
  }
  .ci-card-meta {
    font-size: 0.64rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ci-card-meta span {
    color: var(--cat-color);
    opacity: 0.85;
  }

  /* Badge de rating */
  .ci-rating-badge {
    position: absolute;
    top: 0.45rem;
    left: 0.45rem;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    z-index: 2;
  }

  /* Botón agregar */
  .catidx-add-btn {
    position: absolute;
    top: 0.45rem;
    right: 0.45rem;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(8,10,15,0.75);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 3;
    backdrop-filter: blur(4px);
  }
  .ci-card:hover .catidx-add-btn { opacity: 1; }

  /* Empty state */
  .ci-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
  }
  .ci-empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .ci-empty h3 {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--text);
    opacity: 0.5;
    margin-bottom: 0.5rem;
  }
  .ci-empty p { font-size: 0.82rem; }

  /* Divider con año */
  .ci-year-group { grid-column: 1 / -1; }
  .ci-year-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 0.95rem;
    letter-spacing: 3px;
    color: var(--cat-color);
    opacity: 0.6;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
    margin-top: 0.5rem;
  }
  .ci-year-line { flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>

<header style="display:flex;align-items:center;justify-content:space-between">
  <div class="logo"><a href="/" style="text-decoration:none;color:inherit">NEXUS<span>.</span></a></div>
</header>

<div class="ci-wrap">

  <!-- Cabecera -->
  <div class="ci-header">
    <a href="/">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Inicio
    </a>
    <span class="ci-sep">/</span>
    <h1 class="ci-titulo" id="ci-titulo">—</h1>
    <span class="ci-count" id="ci-count"></span>
  </div>

  <!-- Botón filtros móvil -->
  <div class="ci-topbar-movil">
    <button class="ci-filtros-btn-movil" onclick="toggleSidebarMovil()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Filtros
    </button>
  </div>

  <div class="ci-body">

    <!-- Sidebar filtros -->
    <aside class="ci-sidebar" id="ci-sidebar">

      <div class="ci-sidebar-titulo">
        <span>Filtros</span>
        <button class="ci-clear-btn" id="ci-clear-btn" onclick="limpiarFiltros()">Limpiar todo</button>
      </div>

      <!-- Buscador -->
      <div class="ci-filtro-seccion">
        <div class="ci-filtro-label">Buscar</div>
        <div class="ci-search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="ci-search" id="ci-buscar" placeholder="Título..." autocomplete="off">
        </div>
      </div>

      <!-- Filtros dinámicos por categoría -->
      <div id="ci-filtros-dinamicos"></div>

      <!-- Ordenar -->
      <div class="ci-filtro-seccion">
        <div class="ci-filtro-label">Ordenar por</div>
        <select class="ci-select" id="ci-orden">
          <option value="reciente">Más reciente</option>
          <option value="titulo">A – Z</option>
          <option value="titulo-desc">Z – A</option>
          <option value="rating-desc">Mayor rating</option>
          <option value="rating-asc">Menor rating</option>
          <option value="año-desc">Año (reciente)</option>
          <option value="año-asc">Año (antiguo)</option>
        </select>
      </div>

    </aside>

    <!-- Grid -->
    <div style="display:flex;flex-direction:column;gap:0.75rem;min-width:0">
      <div id="ci-pag-arriba"></div>
      <div class="ci-grid" id="ci-grid"></div>
      <div id="ci-pag-abajo"></div>
    </div>

  </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/auth-header.js"></script>
<script src="/js/auth-header-html.js"></script>
<script src="/js/categoria-index.js"></script>
<script src="/js/api-search.js"></script>
</body>
</html>
