<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Categoría</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23080a0f'/><text x='50' y='72' font-family='Arial Black,sans-serif' font-size='62' font-weight='900' text-anchor='middle' fill='%23e8ff47'>N</text></svg>">
</head>
<body>

<header style="display:flex;align-items:center;justify-content:space-between">
  <div class="logo"><a href="/" style="text-decoration:none;color:inherit">NEXUS<span>.</span></a></div>
</header>

<div class="ci-wrap">

  <!-- Cabecera -->
  <div class="ci-header">
    <a href="/">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Inicio
    </a>
    <span class="ci-sep">/</span>
    <h1 class="ci-titulo" id="ci-titulo">—</h1>
    <span class="ci-count" id="ci-count"></span>
  </div>

  <!-- Botón filtros móvil -->
  <div class="ci-topbar-movil">
    <button class="ci-filtros-btn-movil" onclick="toggleSidebarMovil()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Filtros
    </button>
  </div>

  <div class="ci-body">

    <!-- Sidebar filtros -->
    <aside class="ci-sidebar" id="ci-sidebar">

      <div class="ci-sidebar-titulo">
        <span>Filtros</span>
        <button class="ci-clear-btn" id="ci-clear-btn" onclick="limpiarFiltros()">Limpiar todo</button>
      </div>

      <!-- Buscador -->
      <div class="ci-filtro-seccion">
        <div class="ci-filtro-label">Buscar</div>
        <div class="ci-search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="ci-search" id="ci-buscar" placeholder="Título..." autocomplete="off">
        </div>
      </div>

      <!-- Filtros dinámicos por categoría -->
      <div id="ci-filtros-dinamicos"></div>

      <!-- Ordenar -->
      <div class="ci-filtro-seccion">
        <div class="ci-filtro-label">Ordenar por</div>
        <select class="ci-select" id="ci-orden">
          <option value="reciente">Más reciente</option>
          <option value="titulo">A – Z</option>
          <option value="titulo-desc">Z – A</option>
          <option value="rating-desc">Mayor rating</option>
          <option value="rating-asc">Menor rating</option>
          <option value="año-desc">Año (reciente)</option>
          <option value="año-asc">Año (antiguo)</option>
        </select>
      </div>

    </aside>

    <!-- Grid -->
    <div style="display:flex;flex-direction:column;gap:0.75rem;min-width:0">
      <div id="ci-pag-arriba"></div>
      <div class="ci-grid" id="ci-grid"></div>
      <div id="ci-pag-abajo"></div>
    </div>

  </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/auth-header.js"></script>
<script src="/js/auth-header-html.js"></script>
<script src="/js/categoria-index.js"></script>
<script src="/js/api-search.js"></script>
</body>
</html>
