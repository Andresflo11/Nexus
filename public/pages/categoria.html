<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Categoría</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23080a0f'/><text x='50' y='72' font-family='Arial Black,sans-serif' font-size='62' font-weight='900' text-anchor='middle' fill='%23e8ff47'>N</text></svg>">
</head>
<body>

<header>
  <div class="logo"><a href="/" style="text-decoration:none;color:inherit">NEXUS<span>.</span></a></div>
  <div class="header-stats">
    <div class="header-stat"><strong id="total-count">0</strong>EN ESTA LISTA</div>
    <div class="header-stat"><strong id="avg-rating-header">—</strong>RATING MEDIO</div>
    <div class="header-stat"><strong id="completados-count">0</strong>COMPLETADOS</div>
  </div>
  <div class="header-actions">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="buscadorGlobal" placeholder="Buscar en todo...">
      <div id="resultadosBusqueda" class="search-results"></div>
    </div>
    <button class="cta-btn" id="toggle-form">+ Añadir</button>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="section-label">Navegar</div>
    <a class="platform-btn" href="/">
      <span class="platform-dot" style="background:var(--accent)"></span>
      ← Inicio
    </a>

    <div class="section-label">Categorías</div>
    <a class="platform-btn" href="/pages/categoria.html?tipo=juegos">
      <span class="platform-dot" style="background:#7c5cfc"></span>🎮 Juegos
    </a>
    <a class="platform-btn" href="/pages/categoria.html?tipo=peliculas">
      <span class="platform-dot" style="background:#ed1c24"></span>🎬 Películas
    </a>
    <a class="platform-btn" href="/pages/categoria.html?tipo=series">
      <span class="platform-dot" style="background:#00c030"></span>📺 Series
    </a>
    <a class="platform-btn" href="/pages/categoria.html?tipo=animes">
      <span class="platform-dot" style="background:#2e51a2"></span>⛩ Animes
    </a>
    <a class="platform-btn" href="/pages/categoria.html?tipo=mangas">
      <span class="platform-dot" style="background:#e91e63"></span>📕 Mangas
    </a>
    <a class="platform-btn" href="/pages/categoria.html?tipo=comics">
      <span class="platform-dot" style="background:#ff6b35"></span>💥 Cómics
    </a>
    <a class="platform-btn" href="/pages/categoria.html?tipo=libros">
      <span class="platform-dot" style="background:#c8a85e"></span>📚 Libros
    </a>

    <div class="section-label" style="margin-top:1.5rem">Filtrar por estado</div>
    <div id="filtros"></div>

    <div class="section-label" style="margin-top:1.5rem">Ordenar</div>
    <select id="sort-select" onchange="aplicarOrden()" style="width:100%;padding:0.5rem 0.75rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.8rem;outline:none;">
      <option value="reciente">Más reciente</option>
      <option value="rating-desc">Mayor rating</option>
      <option value="rating-asc">Menor rating</option>
      <option value="titulo">A – Z</option>
      <option value="año-desc">Año ↓ (nuevo→viejo)</option>   <!-- ← nuevo -->
      <option value="año-asc">Año ↑ (viejo→nuevo)</option> 
    </select>

    <div class="section-label" style="margin-top:1.5rem">Vista</div>
    <div class="view-toggle" style="width:100%">
      <button class="view-btn active" id="grid-btn" onclick="setView('grid')" style="flex:1">⊞ Grid</button>
      <button class="view-btn" id="list-btn" onclick="setView('list')" style="flex:1">☰ Lista</button>
    </div>
  </aside>

  <main>
    <div class="section-header">
      <h2 id="titulo-categoria">CARGANDO...</h2>
      <span class="count" id="showing-count"></span>
    </div>

    <!-- Formulario de añadir -->
    <div id="form-container" class="form-panel oculto">
      <h3 class="form-title">Añadir nuevo elemento</h3>
      <form id="formulario" class="form-grid"></form>
    </div>

    <!-- Lista/Grid de items -->
    <div id="lista"></div>
  </main>
</div>

<!-- Modal confirmación eliminar -->
<div class="modal-overlay oculto" id="modalConfirmacion">
  <div class="modal" style="max-width:380px;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:1rem">🗑</div>
    <h3 style="font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:2px;margin-bottom:0.5rem">CONFIRMAR ELIMINACIÓN</h3>
    <p style="color:var(--muted);font-size:0.875rem;margin-bottom:1.5rem">Esta acción no se puede deshacer. ¿Estás seguro?</p>
    <div style="display:flex;gap:0.75rem;justify-content:center">
      <button id="btnCancelar" class="link-btn" style="padding:0.6rem 1.5rem">Cancelar</button>
      <button id="btnConfirmar" class="cta-btn" style="background:#ef4444;border-color:#ef4444">Eliminar</button>
    </div>
  </div>
</div>
<!-- Modal expandido de card -->
<div class="modal-overlay oculto" id="modal-expandido">
  <div class="modal-expandido-inner">

    <!-- Fondo con imagen blur -->
    <div class="me-bg" id="me-bg"></div>

    <!-- Contenido -->
    <div class="me-layout">

      <!-- Columna izquierda: póster + acciones rápidas -->
      <div class="me-sidebar">
        <div class="me-poster" id="me-poster"></div>

        <div class="me-acciones">
          <select id="me-estado" onchange="meGuardarCampo('estado', this.value)"></select>
          <select id="me-valoracion" onchange="meGuardarCampo('valoracion', parseInt(this.value))">
            <option value="5">Me Encanta</option>
            <option value="4">Me gustó</option>
            <option value="3">Indiferente</option>
            <option value="2">No me gustó</option>
            <option value="1">Pésimo</option>
            <option value="0">Sin valorar</option>
          </select>
          <button class="me-btn-completar" id="me-btn-completar" onclick="meCompletarRapido()"></button>
        </div>
      </div>

      <!-- Columna derecha: info -->
      <div class="me-contenido">
        <button class="close-btn" style="margin-left:auto;display:flex" onclick="cerrarModalExpandido()">✕</button>

        <h2 class="me-titulo" id="me-titulo"></h2>

        <div class="me-meta" id="me-meta"></div>
        <div id="me-dlcs" class="oculto" style="margin-bottom:1.25rem"></div>

        <!-- Progreso episodios (series/animes) -->
        <div id="me-episodios" class="oculto">
          <div class="me-progreso-header">
            <span id="me-progreso-texto"></span>
            <div class="progress-btns">
              <button class="prog-btn" onclick="mecambiarEpisodio(-1)">−</button>
              <span class="prog-num" id="me-ep-num"></span>
              <button class="prog-btn" onclick="mecambiarEpisodio(1)">+</button>
            </div>
          </div>
          <div class="progress-wrap" style="margin-bottom:1.25rem">
            <div class="progress-fill" id="me-barra-ep" style="width:0%;will-change:width;transform:translateZ(0)"></div>
          </div>

          <!-- Tabs de temporadas -->
          <div class="me-tabs" id="me-tabs"></div>
          <div class="me-tab-contenido" id="me-tab-contenido"></div>
        </div>
         <div id="me-tomos" class="oculto"></div>
        <!-- Progreso capítulos (comics/mangas) -->
        <div id="me-capitulos" class="oculto">
          <div class="me-progreso-header">
            <span id="me-cap-texto"></span>
            <div class="progress-btns">
              <button class="prog-btn" onclick="mecambiarCapitulo(-1)">−</button>
              <span class="prog-num" id="me-cap-num"></span>
              <button class="prog-btn" onclick="mecambiarCapitulo(1)">+</button>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-fill" id="me-barra-cap" style="width:0%"></div>
          </div>
        </div>

        <!-- Progreso páginas (libros) -->
        <div id="me-paginas" class="oculto">
          <div class="me-progreso-header">
            <span id="me-pag-texto"></span>
            <div class="progress-btns">
              <button class="prog-btn" onclick="mecambiarPagina(-1)">−</button>
              <span class="prog-num" id="me-pag-num"></span>
              <button class="prog-btn" onclick="mecambiarPagina(1)">+</button>
            </div>
          </div>
          <div class="progress-wrap">
            <div class="progress-fill" id="me-barra-pag" style="width:0%"></div>
          </div>
        </div>

        <button class="me-btn-editar" onclick="meAbrirEdicion()">✏ Editar todos los campos</button>
      </div>
    </div>
  </div>
</div>
<script src="/js/datePicker.js"></script>
<script src="/js/config.js"></script>
<script src="/js/busquedaGlobal.js"></script>
<script src="/js/cat-core.js"></script>
<script src="/js/cat-render.js"></script>
<script src="/js/cat-forms.js"></script>
<script src="/js/cat-modal.js"></script>
</body>
</html>
